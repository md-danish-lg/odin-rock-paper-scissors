<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="main-container">
        <header>
            <nav>
                <h1>ROCK PAPER SCISSORS</h1>
            </nav>
        </header>

        <div class="info">
            <h1 class="status">Make your Choice</h1>
            <p class="condition">First to 5 Wins!</p>
        </div>


        <div class="current-choice">
            <div class="player-choice choice">
                <p class="mark player-mark">❓</p>
                <p class="player-score">Player: 0</p>
            </div>
            <div class="computer-choice choice">
                <p class="mark computer-mark">❓</p>
                <p class="computer-score">Computer: 0</p>
            </div>
        </div>


        <div class="input-btn">
            <button id="rock">✊</button>
            <button id="paper">✋</button>
            <button id="scissors">✌</button>
        </div>
        
    </div>
    <footer>
            Copyright © 2026 md-danish-lg    
    </footer>
    <script src="main.js"></script>
</body>
</html>
